# Copy to inventory.ini and adjust.
# ansible-playbook -i inventory.ini playbook.yml

[kali_lab]
kali-lab ansible_host=192.168.11.128 ansible_user=kali ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new'
# Default Kali VM: same password for SSH and sudo — uncomment if apt tasks fail:
# ansible_ssh_pass=kali
# ansible_become_password=kali

# If the tree was rsync’d and git update fails, run with: -e hexstrike_lab_git_force=true

# If you use SSH keys, omit password prompts.
# ansible_ssh_private_key_file=~/.ssh/id_ed25519
